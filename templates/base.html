{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlatePal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">

        <a class="navbar-brand recipe-logo" href="{% url 'home' %}">
            <div class="logo-icon">
                <div class="steam steam-1"></div>
                <div class="steam steam-2"></div>
                <div class="bowl"></div>
            </div>
            <span class="logo-text">Plate<span class="light-text">Pal</span></span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#plateNavbar" aria-controls="plateNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="plateNavbar">
            <div class="d-flex flex-column flex-lg-row align-items-stretch align-items-lg-center gap-3 ms-auto mt-3 mt-lg-0">
                
                <form class="d-flex logo-search-bar" action="{% url 'search-page' %}" method="GET">
                    <input class="form-control me-2" type="search" name="q" placeholder="Search recipes..." required>
                    <button class="btn btn-primary-action" type="submit">Search</button>
                </form>

                <a href="{% url 'favorites' %}" class="btn btn-favorite">
                    <span class="heart-icon">❤️</span> Favorites
                </a>

                <span class="user-greeting">
                    Hi, {{ user.username }}
                </span>

                <form method="POST" action="{% url 'logout' %}" class="m-0 d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-logout">Logout</button>
                </form>

            </div>
        </div>

    </div>
</nav>
{% endif %}

<main class="content-wrapper">
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
