{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">
    ❤️ My Favorites
</h2>

<div class="row">

```
{% for recipe in recipes %}

<div class="col-md-4 mb-4">

    <div class="card h-100 shadow-sm">

        <img
            src="{{ recipe.strMealThumb }}"
            class="card-img-top"
            alt="{{ recipe.strMeal }}"
        >

        <div class="card-body">

            <h5 class="card-title">
                {{ recipe.strMeal }}
            </h5>

            <p class="text-muted">
                {{ recipe.strArea }}
            </p>

            <a
                href="{% url 'recipe-detail' recipe.idMeal %}"
                class="btn btn-success"
            >
                View Recipe
            </a>

            <form
                method="POST"
                action="{% url 'remove-favorite' recipe.idMeal %}"
                class="mt-2"
            >

                {% csrf_token %}

                <button
                    type="submit"
                    class="btn btn-outline-danger"
                >
                    Remove ❤️
                </button>

            </form>

        </div>

    </div>

</div>

{% empty %}

<div class="col-12">

    <div class="alert alert-info">
        You haven't added any favorites yet.
    </div>

</div>

{% endfor %}
```

</div>

{% endblock %}
