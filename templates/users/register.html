{% extends "base.html" %}

{% block content %}

<div class="login-card">


<h2 class="mb-4 text-center">
    Login
</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button
        type="submit"
        class="btn btn-primary w-100"
    >
        Login
    </button>

</form>

<p class="mt-3 text-center">

    Don't have an account?

    <a href="{% url 'register-page' %}">
        Register
    </a>

</p>


</div>

{% endblock %}
